asyncapi: '2.6.0'
info:
  title: Onfido Webhooks
  version: '3.6'
  description: |
    AsyncAPI description of the Onfido webhook surface.

    Onfido posts webhook events to a customer-registered HTTPS endpoint when a
    monitored resource (check, report, workflow run, workflow task, watchlist
    monitor, etc.) changes state. Each request is signed with HMAC-SHA256 using
    the per-webhook secret token returned at registration time; the signature
    is delivered in the `X-SHA2-Signature` header and computed over the raw
    request body.

    This document was generated from the public Onfido / Entrust Identity
    Verification API reference and the `onfido-openapi.yml` definition that
    lives alongside it in this repository. Event names, resource types,
    object statuses, and the payload envelope are taken verbatim from the
    `webhook_event_type`, `webhook_event_resource_type`,
    `webhook_event_object_status`, `webhook_event_payload`,
    `webhook_event_payload_object`, and `webhook_event_payload_resource`
    schemas in the OpenAPI document.
  contact:
    name: Onfido Documentation
    url: https://documentation.onfido.com/api/latest/#webhooks
  license:
    name: Proprietary
    url: https://onfido.com/termsofuse/

defaultContentType: application/json

servers:
  consumer:
    url: '{webhook_url}'
    protocol: https
    description: >-
      Customer-hosted HTTPS endpoint registered with Onfido via
      `POST /v3.6/webhooks/`. Onfido delivers events as HTTP POST requests to
      this URL. The endpoint must respond with a 2xx status code; non-2xx
      responses trigger retries.
    variables:
      webhook_url:
        default: https://example.com/onfido-webhook
        description: The HTTPS URL registered as the webhook destination.

channels:
  onfido/webhook:
    description: >-
      Single channel that receives every Onfido webhook event posted to the
      registered consumer URL. The specific event type is carried in
      `payload.action`, with the affected resource family in
      `payload.resource_type`.
    bindings:
      http:
        type: request
        method: POST
        bindingVersion: '0.3.0'
    subscribe:
      operationId: receiveOnfidoWebhookEvent
      summary: Receive an Onfido webhook event.
      description: >-
        Onfido POSTs a JSON envelope describing a single resource state change.
        Verify the `X-SHA2-Signature` header against an HMAC-SHA256 of the raw
        request body, keyed with the webhook's secret token, before trusting
        the payload.
      bindings:
        http:
          bindingVersion: '0.3.0'
      message:
        oneOf:
          - $ref: '#/components/messages/AuditLogCreated'
          - $ref: '#/components/messages/WatchlistMonitorMatchesUpdated'
          - $ref: '#/components/messages/WorkflowRunStarted'
          - $ref: '#/components/messages/WorkflowRunCompleted'
          - $ref: '#/components/messages/WorkflowTaskStarted'
          - $ref: '#/components/messages/WorkflowTaskCompleted'
          - $ref: '#/components/messages/CheckStarted'
          - $ref: '#/components/messages/CheckReopened'
          - $ref: '#/components/messages/CheckWithdrawn'
          - $ref: '#/components/messages/CheckCompleted'
          - $ref: '#/components/messages/CheckFormCompleted'
          - $ref: '#/components/messages/ReportWithdrawn'
          - $ref: '#/components/messages/ReportResumed'
          - $ref: '#/components/messages/ReportCancelled'
          - $ref: '#/components/messages/ReportAwaitingApproval'
          - $ref: '#/components/messages/ReportCompleted'
          - $ref: '#/components/messages/WorkflowTimelineFileCreated'
          - $ref: '#/components/messages/WorkflowSignedEvidenceFileCreated'
          - $ref: '#/components/messages/WorkflowRunEvidenceFolderCreated'

components:
  securitySchemes:
    WebhookSignature:
      type: httpApiKey
      in: header
      name: X-SHA2-Signature
      description: |
        HMAC-SHA256 hexadecimal digest of the raw HTTP request body, keyed
        with the per-webhook secret `token` returned when the webhook was
        registered (also visible on the Dashboard "Webhook Management"
        page). Compare in constant time; reject the request if the digest
        does not match.

  messageTraits:
    OnfidoWebhookHeaders:
      headers:
        type: object
        properties:
          X-SHA2-Signature:
            type: string
            description: >-
              HMAC-SHA256 (hex) of the raw request body, keyed with the
              webhook's secret token.
            example: 8d5f6e8a8a1ddc8f9c0b1f9e3d4d4a2e0c7e8b1a2c3d4e5f60718293a4b5c6d7
        required:
          - X-SHA2-Signature

  messages:
    AuditLogCreated:
      name: AuditLogCreated
      title: audit_log.created
      summary: An audit log entry was created.
      traits:
        - $ref: '#/components/messageTraits/OnfidoWebhookHeaders'
      payload:
        $ref: '#/components/schemas/AuditLogCreatedEnvelope'

    WatchlistMonitorMatchesUpdated:
      name: WatchlistMonitorMatchesUpdated
      title: watchlist_monitor.matches_updated
      summary: A monitored watchlist subject's matches changed.
      traits:
        - $ref: '#/components/messageTraits/OnfidoWebhookHeaders'
      payload:
        $ref: '#/components/schemas/WatchlistMonitorMatchesUpdatedEnvelope'

    WorkflowRunStarted:
      name: WorkflowRunStarted
      title: workflow_run.started
      summary: A workflow run has started.
      traits:
        - $ref: '#/components/messageTraits/OnfidoWebhookHeaders'
      payload:
        $ref: '#/components/schemas/WorkflowRunStartedEnvelope'

    WorkflowRunCompleted:
      name: WorkflowRunCompleted
      title: workflow_run.completed
      summary: A workflow run has completed.
      traits:
        - $ref: '#/components/messageTraits/OnfidoWebhookHeaders'
      payload:
        $ref: '#/components/schemas/WorkflowRunCompletedEnvelope'

    WorkflowTaskStarted:
      name: WorkflowTaskStarted
      title: workflow_task.started
      summary: A workflow task has started.
      traits:
        - $ref: '#/components/messageTraits/OnfidoWebhookHeaders'
      payload:
        $ref: '#/components/schemas/WorkflowTaskStartedEnvelope'

    WorkflowTaskCompleted:
      name: WorkflowTaskCompleted
      title: workflow_task.completed
      summary: A workflow task has completed.
      traits:
        - $ref: '#/components/messageTraits/OnfidoWebhookHeaders'
      payload:
        $ref: '#/components/schemas/WorkflowTaskCompletedEnvelope'

    CheckStarted:
      name: CheckStarted
      title: check.started
      summary: A check has started.
      traits:
        - $ref: '#/components/messageTraits/OnfidoWebhookHeaders'
      payload:
        $ref: '#/components/schemas/CheckStartedEnvelope'

    CheckReopened:
      name: CheckReopened
      title: check.reopened
      summary: A check has been reopened.
      traits:
        - $ref: '#/components/messageTraits/OnfidoWebhookHeaders'
      payload:
        $ref: '#/components/schemas/CheckReopenedEnvelope'

    CheckWithdrawn:
      name: CheckWithdrawn
      title: check.withdrawn
      summary: A check has been withdrawn.
      traits:
        - $ref: '#/components/messageTraits/OnfidoWebhookHeaders'
      payload:
        $ref: '#/components/schemas/CheckWithdrawnEnvelope'

    CheckCompleted:
      name: CheckCompleted
      title: check.completed
      summary: A check has completed.
      traits:
        - $ref: '#/components/messageTraits/OnfidoWebhookHeaders'
      payload:
        $ref: '#/components/schemas/CheckCompletedEnvelope'

    CheckFormCompleted:
      name: CheckFormCompleted
      title: check.form_completed
      summary: The applicant form portion of a check has been completed.
      traits:
        - $ref: '#/components/messageTraits/OnfidoWebhookHeaders'
      payload:
        $ref: '#/components/schemas/CheckFormCompletedEnvelope'

    ReportWithdrawn:
      name: ReportWithdrawn
      title: report.withdrawn
      summary: A report has been withdrawn.
      traits:
        - $ref: '#/components/messageTraits/OnfidoWebhookHeaders'
      payload:
        $ref: '#/components/schemas/ReportWithdrawnEnvelope'

    ReportResumed:
      name: ReportResumed
      title: report.resumed
      summary: A previously paused report has been resumed.
      traits:
        - $ref: '#/components/messageTraits/OnfidoWebhookHeaders'
      payload:
        $ref: '#/components/schemas/ReportResumedEnvelope'

    ReportCancelled:
      name: ReportCancelled
      title: report.cancelled
      summary: A report has been cancelled.
      traits:
        - $ref: '#/components/messageTraits/OnfidoWebhookHeaders'
      payload:
        $ref: '#/components/schemas/ReportCancelledEnvelope'

    ReportAwaitingApproval:
      name: ReportAwaitingApproval
      title: report.awaiting_approval
      summary: A report is awaiting reviewer approval.
      traits:
        - $ref: '#/components/messageTraits/OnfidoWebhookHeaders'
      payload:
        $ref: '#/components/schemas/ReportAwaitingApprovalEnvelope'

    ReportCompleted:
      name: ReportCompleted
      title: report.completed
      summary: A report has completed.
      traits:
        - $ref: '#/components/messageTraits/OnfidoWebhookHeaders'
      payload:
        $ref: '#/components/schemas/ReportCompletedEnvelope'

    WorkflowTimelineFileCreated:
      name: WorkflowTimelineFileCreated
      title: workflow_timeline_file.created
      summary: A workflow timeline file has been generated.
      traits:
        - $ref: '#/components/messageTraits/OnfidoWebhookHeaders'
      payload:
        $ref: '#/components/schemas/WorkflowTimelineFileCreatedEnvelope'

    WorkflowSignedEvidenceFileCreated:
      name: WorkflowSignedEvidenceFileCreated
      title: workflow_signed_evidence_file.created
      summary: A signed workflow evidence file has been generated.
      traits:
        - $ref: '#/components/messageTraits/OnfidoWebhookHeaders'
      payload:
