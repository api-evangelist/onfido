    WorkflowRunEvidenceFolderCreated:
      name: WorkflowRunEvidenceFolderCreated
      title: workflow_run_evidence_folder.created
      summary: An evidence folder for a workflow run has been created.
      traits:
        - $ref: '#/components/messageTraits/OnfidoWebhookHeaders'
      payload:
        $ref: '#/components/schemas/WorkflowRunEvidenceFolderCreatedEnvelope'

  schemas:
    WebhookEventResourceType:
      type: string
      description: Indicates the resource family affected by the event.
      enum:
        - check
        - report
        - audit_log
        - workflow_run
        - workflow_task
        - watchlist_monitor
        - workflow_timeline_file
        - workflow_run_evidence_folder

    WebhookEventType:
      type: string
      description: The specific event that triggered the webhook delivery.
      enum:
        - audit_log.created
        - watchlist_monitor.matches_updated
        - workflow_run.completed
        - workflow_task.started
        - workflow_task.completed
        - check.started
        - check.reopened
        - check.withdrawn
        - check.completed
        - check.form_completed
        - report.withdrawn
        - report.resumed
        - report.cancelled
        - report.awaiting_approval
        - report.completed
        - workflow_timeline_file.created
        - workflow_signed_evidence_file.created
        - workflow_run_evidence_folder.created

    WebhookEventObjectStatus:
      type: string
      description: The current state of the affected object, if available.
      example: complete
      enum:
        - processing
        - awaiting_input
        - awaiting_client_input
        - approved
        - declined
        - review
        - abandoned
        - error
        - started
        - cancelled
        - completed
        - awaiting_data
        - awaiting_approval
        - complete
        - withdrawn
        - in_progress
        - awaiting_applicant
        - paused
        - reopened

    WebhookEventPayloadObject:
      type: object
      description: The object affected by this event.
      required:
        - id
        - href
      properties:
        id:
          type: string
          description: The unique identifier of the resource.
        status:
          $ref: '#/components/schemas/WebhookEventObjectStatus'
        started_at_iso8601:
          type: string
          format: date-time
          description: The date and time when the operation was started, if available.
          example: '2019-10-28T14:55:09.000Z'
        completed_at_iso8601:
          type: string
          format: date-time
          description: The date and time when the operation was completed, if available.
          example: '2019-10-28T15:00:39.000Z'
        href:
          type: string
          description: The uri of the resource.

    WebhookEventPayloadResource:
      type: object
      description: The resource affected by this event.
      properties:
        id:
          type: string
          description: The identifier of the resource.
          example: profile_4f4b2
        applicant_id:
          type: string
          format: uuid
          description: The unique identifier for the Applicant.
        created_at:
          type: string
          format: date-time
          example: '2022-12-05T16:41:43.000Z'
        updated_at:
          type: string
          format: date-time
          example: '2022-12-19T16:41:44.000Z'
        dashboard_url:
          type: string
          description: The URL for viewing the resource on Onfido Dashboard.
          example: https://dashboard.onfido.com/results/36a56899-d617-4988-85bf-b76640861bf5
        workflow_id:
          type: string
          format: uuid
        workflow_run_id:
          type: string
          format: uuid
          example: 2f152409-d6c4-4711-8750-48517f99a8d6
        workflow_version_id:
          type: integer
          description: The identifier for the Workflow version.
          example: 0
        task_def_id:
          type: string
          description: The identifier for the Task Definition.
          example: task_123
          pattern: '^[0-9a-z_-]+$'
        task_def_version:
          type: string
          nullable: true
        input:
          type: object
          description: Input object with the fields used by the Task execution.
        output:
          type: object
          nullable: true
          description: Output object produced by the Task execution.
        reasons:
          type: array
          items:
            type: string
          description: >-
            The reasons the Workflow Run outcome was reached. Configurable when
            creating the Workflow Version.

    WebhookEventPayload:
      type: object
      description: Inner payload envelope describing the event.
      required:
        - resource_type
        - action
        - object
      properties:
        resource_type:
          $ref: '#/components/schemas/WebhookEventResourceType'
        action:
          $ref: '#/components/schemas/WebhookEventType'
        object:
          $ref: '#/components/schemas/WebhookEventPayloadObject'
        resource:
          $ref: '#/components/schemas/WebhookEventPayloadResource'

    WebhookEventEnvelope:
      type: object
      description: Top-level webhook delivery envelope. The JSON body posted to the consumer URL.
      required:
        - payload
      properties:
        payload:
          $ref: '#/components/schemas/WebhookEventPayload'

    AuditLogCreatedEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEventEnvelope'
      example:
        payload:
          resource_type: audit_log
          action: audit_log.created
          object:
            id: 7f2b3c01-9999-4d20-9c19-12c3a4b5d6e7
            status: completed
            completed_at_iso8601: '2023-01-15T09:00:00Z'
            href: https://api.eu.onfido.com/v3.6/audit_logs/7f2b3c01-9999-4d20-9c19-12c3a4b5d6e7

    WatchlistMonitorMatchesUpdatedEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEventEnvelope'
      example:
        payload:
          resource_type: watchlist_monitor
          action: watchlist_monitor.matches_updated
          object:
            id: 11111111-2222-3333-4444-555555555555
            status: completed
            completed_at_iso8601: '2023-08-24T11:49:20Z'
            href: https://api.eu.onfido.com/v3.6/watchlist_monitors/11111111-2222-3333-4444-555555555555

    WorkflowRunStartedEnvelope:
