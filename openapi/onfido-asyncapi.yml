            href: https://api.eu.onfido.com/v3.6/checks/aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee

    CheckWithdrawnEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEventEnvelope'
      example:
        payload:
          resource_type: check
          action: check.withdrawn
          object:
            id: aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee
            status: withdrawn
            href: https://api.eu.onfido.com/v3.6/checks/aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee

    CheckCompletedEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEventEnvelope'
      example:
        payload:
          resource_type: check
          action: check.completed
          object:
            id: aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee
