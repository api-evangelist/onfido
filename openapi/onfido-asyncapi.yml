            href: https://api.eu.onfido.com/v3.6/workflow_runs/2f152409-d6c4-4711-8750-48517f99a8d6/tasks/7a6b8c9d-1111-2222-3333-444455556666

    WorkflowTaskCompletedEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEventEnvelope'
      example:
        payload:
          resource_type: workflow_task
          action: workflow_task.completed
          object:
            id: 7a6b8c9d-1111-2222-3333-444455556666
            status: completed
            completed_at_iso8601: '2022-12-19T16:53:00Z'
            href: https://api.eu.onfido.com/v3.6/workflow_runs/2f152409-d6c4-4711-8750-48517f99a8d6/tasks/7a6b8c9d-1111-2222-3333-444455556666

    CheckStartedEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEventEnvelope'
      example:
