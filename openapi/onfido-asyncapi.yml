          resource_type: check
          action: check.started
          object:
            id: aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee
            status: in_progress
            started_at_iso8601: '2022-01-06T15:30:00Z'
            href: https://api.eu.onfido.com/v3.6/checks/aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee

    CheckReopenedEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEventEnvelope'
      example:
        payload:
          resource_type: check
          action: check.reopened
          object:
            id: aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee
